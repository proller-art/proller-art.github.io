    <style>
        #project_hero {
            position: relative;
            width: 100%;
            margin-bottom: 40px;
        }
        .project_img {
            position: absolute;
            border-radius: 20px;
            overflow: hidden;
            filter: drop-shadow(0px 4px 4px #20252d55);
        }
        #project_summary {
            position: relative;
            width: 100%;
            padding-bottom: 80px;
        }
        #project_title {
            height: 80px;
            width: 390px;
            text-transform: uppercase;
            line-height: 32px;
            font-size: 36px;
            font-weight: 900;
        }
        #project_info {
            display: flex;
        }
        #project_details {
            display: flex;
            flex-direction: column;
            margin-top: 22px;
        }
        .detail {
            display: flex;
            flex-direction: row;
            margin-bottom: 40px;
        }
        .detail_label {
            width: 195px;
            font-weight: 900;
            text-transform: uppercase;
        }
        .detail_items {
            display: flex;
            flex-direction: column;
            width: 195px;
        }
        .detail_items div {
            height: 28px;
        }
        #project_body_text {
            position: relative;
            margin-top: 22px;
        }
        #blob1, #blob2 {
            position: absolute;
        }
        @media (max-width: 989px) { /*mobile*/
            #project_hero {
                height: calc((100vw - 84px) / 318px * 400px);
            }
            .project_img {
                top: 0px;
                left: 0px;
                height: calc((100vw - 84px) / 318px * 400px);
                width: 100%;
            }
            .project_img img {
                width: 220%;
                transform: translate(-50%, -50%);
            }
            #blob1 {
                top: calc((100vw - 84px) / 318px * 40px);
                right: -42px;
                height: calc((100vw - 84px) / 318px * 240px);
                width: 50vw;
            }
            #blob2 {
                bottom: calc((100vw - 84px) / 318px * 40px);
                left: -42px;
                height: calc((100vw - 84px) / 318px * 240px);
                width: 50vw;
            }
            #project_title {
                margin-left: 0px;
            }
            #project_info {
                flex-direction: column;
            }
            #project_details {
                margin-left: 0px;
            }
            #project_body_text {
                margin-left: 0px;
            }
            #zoom {
                display: none;
            }
        }
        @media (min-width: 990px) { /*desktop narrow*/
            #project_hero {
                height: 400px;
            }
            .project_img {
                top: 40px;
                left: 65px;
                height: 360px;
                width: 780px;
            }
            .project_img img {
                width: 100%;
                transform: translate(-50%, -50%);
            }
            #blob1 {
                top: 0px;
                right: 0px;
                height: 360px;
                width: 260px;
            }
            #blob2 {
                bottom: 40px;
                left: 0px;
                height: 200px;
                width: 130px;
            }
            #project_title {
                margin-left: 65px;
            }
            #project_info {
                flex-direction: column;
            }
            #project_details {
                margin-left: 65px;
            }
            #project_body_text {
                margin-left: 260px
            }
            #zoom {
                display: flex;
            }
        }
        @media (min-width: 1380px) { /*full desktop*/
            #project_hero {
                height: 520px;
            }
            .project_img {
                top: 40px;
                left: 130px;
                height: 480px;
                width: 1040px;
            }
            .project_img img {
                width: 100%;
                transform: translate(-50%, -50%);

                bottom: 40px;
                left: 0px;
                height: 320px;

            #project_info {
                flex-direction: row;
            }
